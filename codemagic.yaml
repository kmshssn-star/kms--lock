workflows:
  android-workflow:
    name: Android Workflow
    instance_type: linux_x2
    max_build_duration: 120
    environment:
      vars:
        PACKAGE_NAME: "com.kmslock.app"
        GRADLE_OPTS: "-Xmx3072m -XX:MaxPermSize=512m"
      java: 11
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Build Debug APK
        script: |
          cd $FCI_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - $PERSONAL_EMAIL
        notify:
          success: true
          failure: true
